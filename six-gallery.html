<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>六件作品集</title>
  <style>
    :root{--bg:#fff6ee;--card:#fffdf9;--muted:#6b5a49;--accent:#2f6f4e}
    html,body{height:100%;margin:0;font-family:'Noto Sans TC',system-ui,Segoe UI,Roboto,Arial;background:radial-gradient(700px 300px at 6% 10%, rgba(255,230,200,0.9), transparent 12%), linear-gradient(180deg,#fffaf3,#fbf6ee);color:#261d14}
    .wrap{max-width:1180px;margin:28px auto;padding:20px;}
    .hero{background:linear-gradient(180deg,rgba(255,255,255,0.96),rgba(252,247,242,0.96));padding:28px;border-radius:20px;margin-bottom:18px;box-shadow:0 12px 28px rgba(12,8,6,0.06)}
    .hero h1{font-family:'Noto Serif TC',serif;font-size:2.6rem;margin:0}
    .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:24px;margin-top:18px}
    .card{background:linear-gradient(180deg,rgba(255,255,255,0.92),rgba(250,245,240,0.96));border-radius:26px;padding:18px;box-shadow:0 18px 36px rgba(20,16,12,0.06);position:relative;overflow:visible;border:1px solid rgba(24,20,16,0.03)}
    .card h3{margin:0 0 8px 0;font-size:1.12rem}
    .tags{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
    .pill{background:rgba(255,255,255,0.95);padding:6px 10px;border-radius:999px;font-weight:700;border:1px solid rgba(30,26,22,0.04)}
    .preview{height:160px;border-radius:16px;overflow:hidden;position:relative;border:1px solid rgba(30,24,18,0.04);background:linear-gradient(180deg,#f7fbff,#eef6ff)}
    .preview .sticker{position:absolute;width:44px;height:44px;right:12px;bottom:12px;z-index:3}
    .preview .label{position:absolute;left:12px;top:12px;background:rgba(255,255,255,0.95);padding:6px 10px;border-radius:999px;font-weight:800;z-index:2;box-shadow:0 6px 18px rgba(20,18,16,0.06)}
    /* small svg styles */
    .thumb{display:block;width:100%;height:100%}
    @media (max-width:820px){.grid{grid-template-columns:1fr}.wrap{padding:12px}}
  </style>
</head>
<body>
  <div class="wrap">
    <header class="hero">
      <h1>我是施沛辰</h1>
      <p style="margin:8px 0 0;color:var(--muted)">依老師要求將六件作品以卡片排列並加入貼圖示意，點擊縮圖可開啟對應功能。</p>
    </header>

    <section class="grid">
      <!-- 1 -->
      <article class="card">
        <h3>打地鼠</h3>
        <div class="tags"><span class="pill">反應速度</span><span class="pill">點擊互動</span></div>
        <a class="preview-link" href="index.html#whackView">
          <div class="preview">
          <div class="label">Whack-a-Mole</div>
          <svg class="thumb" viewBox="0 0 800 360" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
            <defs>
              <linearGradient id="skyGrad" x1="0" x2="0" y1="0" y2="1"><stop offset="0" stop-color="#cfe9ff"/><stop offset="1" stop-color="#e6f7ff"/></linearGradient>
              <linearGradient id="grassGrad" x1="0" x2="0" y1="0" y2="1"><stop offset="0" stop-color="#9ed07a"/><stop offset="1" stop-color="#82c36a"/></linearGradient>
            </defs>
            <rect width="800" height="360" rx="18" fill="url(#skyGrad)"/>
            <g transform="translate(0,180)">
              <rect y="40" width="800" height="140" rx="18" fill="url(#grassGrad)"/>
              <!-- three holes with subtle rim -->
              <g transform="translate(80,40)">
                <ellipse cx="100" cy="120" rx="70" ry="36" fill="#5a3929"/>
                <ellipse cx="320" cy="120" rx="70" ry="36" fill="#5a3929"/>
                <ellipse cx="540" cy="120" rx="70" ry="36" fill="#5a3929"/>
                <ellipse cx="100" cy="104" rx="54" ry="20" fill="rgba(255,255,255,0.06)"/>
              </g>
            </g>
            <!-- mole, centered above the middle hole -->
            <g transform="translate(360,120)">
              <ellipse cx="40" cy="80" rx="48" ry="44" fill="#6b3f2a"/>
              <ellipse cx="40" cy="46" rx="34" ry="28" fill="#8a4f34"/>
              <circle cx="28" cy="40" r="4" fill="#111"/>
              <circle cx="52" cy="40" r="4" fill="#111"/>
              <ellipse cx="40" cy="56" rx="10" ry="8" fill="#f1c9a6"/>
              <rect x="-14" y="98" width="40" height="14" rx="8" fill="#4e2f20" opacity="0.9"/>
            </g>
            <!-- mallet on the left -->
            <g transform="translate(70,190) rotate(-12)">
              <rect x="0" y="0" width="80" height="26" rx="6" fill="#7a4b2b"/>
              <rect x="64" y="18" width="8" height="84" rx="4" fill="#3c2a23"/>
            </g>
          </svg>
          <svg class="sticker" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
            <defs><linearGradient id="gA" x1="0" x2="1"><stop offset="0" stop-color="#ffd66f"/><stop offset="1" stop-color="#f2b85e"/></linearGradient></defs>
            <rect rx="10" width="48" height="48" fill="url(#gA)"/>
            <text x="50%" y="58%" text-anchor="middle" font-size="14" font-weight="800" fill="#2b1905">+100</text>
          </svg>
        </div>
        </a>
        </div>
      </article>

      <!-- 2 -->
      <article class="card">
        <h3>貪吃蛇</h3>
        <div class="tags"><span class="pill">方向控制</span><span class="pill">空間規劃</span></div>
        <a class="preview-link" href="index.html#snakeView">
          <div class="preview">
          <div class="label">Snake Game</div>
          <svg class="thumb" viewBox="0 0 800 360" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
            <defs>
              <linearGradient id="snakeBg" x1="0" x2="0" y1="0" y2="1"><stop offset="0" stop-color="#124234"/><stop offset="1" stop-color="#0b3629"/></linearGradient>
            </defs>
            <rect width="800" height="360" rx="18" fill="url(#snakeBg)"/>
            <!-- subtle grid -->
            <g stroke="rgba(255,255,255,0.03)" stroke-width="1">
              <g>
                <!-- vertical lines -->
                <path d="M32 0 L32 360 M64 0 L64 360 M96 0 L96 360 M128 0 L128 360 M160 0 L160 360"/>
                <!-- horizontal lines -->
                <path d="M0 32 L800 32 M0 64 L800 64 M0 96 L800 96 M0 128 L800 128"/>
              </g>
            </g>
            <!-- snake body composed of rounded squares -->
            <g fill="#7fe59f">
              <rect x="140" y="80" width="38" height="38" rx="8"/>
              <rect x="184" y="80" width="38" height="38" rx="8"/>
              <rect x="228" y="80" width="38" height="38" rx="8"/>
              <rect x="272" y="80" width="38" height="38" rx="8"/>
              <rect x="316" y="80" width="38" height="38" rx="8"/>
            </g>
            <!-- head with eyes -->
            <g transform="translate(316,80)">
              <rect width="38" height="38" rx="8" fill="#6fd28a"/>
              <circle cx="12" cy="14" r="3" fill="#063"/>
              <circle cx="26" cy="14" r="3" fill="#063"/>
            </g>
            <!-- food squares with values -->
            <g>
              <rect x="620" y="220" width="26" height="26" rx="6" fill="#ffb78f"/>
              <text x="633" y="238" font-size="12" font-weight="800" fill="#7a2b1a" text-anchor="middle">5</text>
              <rect x="560" y="200" width="26" height="26" rx="6" fill="#ffd6e0"/>
              <text x="573" y="218" font-size="12" font-weight="800" fill="#7a2b1a" text-anchor="middle">3</text>
            </g>
          </svg>
          <svg class="sticker" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
            <circle cx="24" cy="24" r="22" fill="#d6ffea"/>
            <path d="M16 30c6 4 12-2 8-6" stroke="#0b6b4a" stroke-width="3" stroke-linecap="round" fill="none"/>
          </svg>
        </div>
        </a>
        </div>
      </article>

      <!-- 3 -->
      <article class="card">
        <h3>工程計算機</h3>
        <div class="tags"><span class="pill">函數運算</span><span class="pill">工具導向</span></div>
        <a class="preview-link" href="index.html?open=calc">
          <div class="preview">
          <div class="label">Engineering Calculator</div>
          <svg class="thumb" viewBox="0 0 800 360" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
            <rect width="800" height="360" rx="18" fill="#112533"/>
            <rect x="18" y="18" width="420" height="56" rx="12" fill="#dff3e6"/>
            <text x="40" y="54" fill="#0b2b24" font-weight="800">sin(45) + log(100)</text>
          </svg>
          <svg class="sticker" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
            <rect rx="8" width="48" height="48" fill="#dfeeff"/>
            <text x="50%" y="58%" text-anchor="middle" font-size="12" font-weight="900" fill="#10304a">Σ</text>
          </svg>
        </div>
        </a>
        </div>
      </article>

      <!-- 4 -->
      <article class="card">
        <h3>Gemini Chat</h3>
        <div class="tags"><span class="pill">AI 對話</span><span class="pill">API 整合</span></div>
        <a class="preview-link" href="gemini-chat.html">
          <div class="preview">
          <div class="label">Gemini Chat</div>
          <svg class="thumb" viewBox="0 0 800 360" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
            <rect width="800" height="360" rx="18" fill="#f4efe8"/>
            <rect x="28" y="48" width="220" height="46" rx="20" fill="#fff"/>
            <rect x="420" y="104" width="340" height="120" rx="16" fill="#e9fff6"/>
          </svg>
          <svg class="sticker" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
            <circle cx="24" cy="24" r="22" fill="#ffead6"/>
            <path d="M18 22h12M18 28h8" stroke="#7a4b2b" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </div>
        </a>
        </div>
      </article>

      <!-- 5 -->
      <article class="card">
        <h3>訊息快速發送台</h3>
        <div class="tags"><span class="pill">SSE</span><span class="pill">HTTP API</span></div>
        <a class="preview-link" href="index.html?open=ntfy">
          <div class="preview">
          <div class="label">ntfy.sh Messenger</div>
          <svg class="thumb" viewBox="0 0 800 360" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
            <rect width="800" height="360" rx="18" fill="#fbfdfb"/>
            <rect x="24" y="48" width="220" height="40" rx="18" fill="#fff"/>
            <g transform="translate(28,110)" fill="#e6ffef"><rect x="0" y="0" width="160" height="40" rx="10"/><rect x="180" y="0" width="120" height="40" rx="10"/></g>
          </svg>
          <svg class="sticker" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
            <rect rx="8" width="48" height="48" fill="#eafff5"/>
            <path d="M14 24h20M14 30h12" stroke="#0b6b4a" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </div>
        </a>
        </div>
      </article>

      <!-- 6 -->
      <article class="card">
        <h3>雲端記事本</h3>
        <div class="tags"><span class="pill">Google Drive</span><span class="pill">Apps Script</span></div>
        <a class="preview-link" href="index.html?open=cloudnotepad">
          <div class="preview">
          <div class="label">Cloud Notepad</div>
          <svg class="thumb" viewBox="0 0 800 360" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
            <rect width="800" height="360" rx="18" fill="#fff7ee"/>
            <rect x="40" y="48" width="680" height="40" rx="10" fill="#fff"/>
            <g fill="#f3e1c9"><rect x="48" y="112" width="644" height="18" rx="8"/><rect x="48" y="140" width="500" height="18" rx="8"/></g>
          </svg>
          <svg class="sticker" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
            <circle cx="24" cy="24" r="22" fill="#fff2df"/>
            <path d="M16 18h16v12H16z" stroke="#a05a1b" stroke-width="1.5" fill="#fff4e6"/>
          </svg>
        </div>
        </a>
        </div>
      </article>

    </section>
  </div>
</body>
</html>
