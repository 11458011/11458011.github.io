<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f1b33" />
  <meta name="author" content="施沛辰" />
  
  <title>程序選擇中心</title>
  <style>
    :root {
      --bg1: #f7efd9;
      --bg2: #e9dcc1;
      --panel: rgba(255, 250, 241, 0.88);
      --line: rgba(101, 82, 57, 0.14);
      --text: #261d14;
      --muted: #6b5a49;
      --accent: #2f6f4e;
      --shadow: 0 24px 60px rgba(55, 41, 24, 0.16);
      --shadow-soft: 0 10px 28px rgba(55, 41, 24, 0.1);
      --radius: 28px;
      --ui-radius: 22px;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html { scroll-behavior: smooth; }
    .chat-actions { margin-top: 12px; display: flex; gap: 8px; }
    .chat-main { min-height: 0; display: grid; grid-template-rows: 1fr auto; gap: 10px; }
    .history-list { margin-top: 8px; display: grid; gap: 8px; align-content: start; max-height: 230px; overflow: auto; }
    .history-empty { color: var(--muted); font-size: 0.92rem; }
    .chat-chip {
      text-align: left;
      border: 1px solid rgba(84, 78, 122, 0.18);
      background: rgba(255, 255, 255, 0.84);
      color: #2d2652;
      border-radius: 12px;
      padding: 8px 10px;
      font-weight: 700;
      cursor: pointer;
    }
    .chat-window {
      border-radius: 18px;
      border: 1px solid rgba(83, 71, 124, 0.18);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.9), rgba(248, 244, 255, 0.88));
      overflow: auto;
      padding: 12px;
      display: grid;
      align-content: start;
      gap: 10px;
    }
    .msg-row { display: grid; gap: 6px; }
    .msg-row.user { justify-items: end; }
    .msg-row.ai { justify-items: start; }
    .msg-head { font-size: 0.82rem; color: #6e6458; font-weight: 800; }
    .msg { max-width: min(88%, 680px); border-radius: 14px; padding: 10px 12px; line-height: 1.6; white-space: pre-wrap; }
    .msg.user { background: linear-gradient(135deg, #d4ebff, #e7f4ff); border: 1px solid rgba(76, 130, 182, 0.24); }
    .msg.ai { background: linear-gradient(135deg, #efe6ff, #f7f1ff); border: 1px solid rgba(124, 97, 184, 0.22); }
    .chat-input-wrap { display: grid; gap: 8px; }
    .chat-input {
      border: 1px solid rgba(95, 81, 138, 0.22);
      border-radius: 12px;
      padding: 12px;
      font: inherit;
      background: rgba(255, 255, 255, 0.92);
      color: #2d2441;
    }
    .chat-input.api-input { min-height: auto; }
    .chat-input.main-input { min-height: 96px; resize: vertical; }
    .chat-input-meta { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    .chat-input-meta span { color: #6e6458; font-weight: 700; }
    .chat-send { min-width: 116px; }
    /* modal */
    .modal { position: fixed; inset: 0; display: none; align-items: center; justify-content: center; z-index: 1200; }
    .modal[aria-hidden="false"] { display: flex; }
    .modal-backdrop { position: absolute; inset: 0; background: rgba(10,10,12,0.48); backdrop-filter: blur(2px); }
    .modal-panel { position: relative; background: linear-gradient(180deg, rgba(255,255,255,0.96), rgba(250,247,244,0.96)); border-radius: 12px; padding: 16px; width: min(720px, 92%); max-height: 84vh; overflow: auto; box-shadow: 0 24px 48px rgba(10,10,20,0.28); border: 1px solid rgba(20,18,16,0.04); }
    .modal-row { display:flex; gap:12px; align-items:center; margin:8px 0 12px 0; }
    .modal-actions { display:flex; gap:10px; justify-content:flex-end; margin-top:8px; }
    .controls { display: flex; gap: 10px; flex-wrap: wrap; }
    button.action { border: 0; border-radius: 14px; padding: 12px 16px; font: inherit; font-weight: 900; color: #1c1408; background: linear-gradient(135deg, #ffd66f, #f2b85e); box-shadow: 0 12px 22px rgba(233, 169, 69, 0.24); cursor: pointer; min-width: 112px; }
    button.action.secondary { color: var(--text); background: rgba(255, 255, 255, 0.72); border: 1px solid rgba(101, 82, 57, 0.12); box-shadow: none; }
    button.action:active, .hole:active { transform: translateY(1px) scale(0.99); }
    .chip { display: inline-flex; align-items: center; gap: 8px; padding: 10px 12px; border-radius: 999px; background: rgba(255, 255, 255, 0.75); color: var(--text); border: 1px solid rgba(101, 82, 57, 0.12); font-weight: 800; white-space: nowrap; }
    .credit { font-size: 0.94rem; color: var(--muted); }
    .back-note { font-size: 0.94rem; }
    .pulse { animation: pulse 0.24s ease-out; }
    @keyframes pulse { from { transform: scale(1); } 50% { transform: scale(1.12); } to { transform: scale(1); } }
    @media (max-width: 900px) { .menu { grid-template-columns: 1fr; } .view { padding: 12px; } .snake-wrap { aspect-ratio: auto; width: 100%; } }
    @media (max-width: 560px) { 
      body { overflow: auto; } 
      .hero h1 { font-size: clamp(2.2rem, 14vw, 3.5rem); } 
      .hud { grid-template-columns: 1fr; } 
      .footer { flex-direction: column; align-items: stretch; } 
      .controls, .footer .controls { width: 100%; } 
      button.action { flex: 1 1 0; min-width: 0; }
      .snake-wrap { width: 100%; aspect-ratio: auto; min-height: auto; display: grid; grid-template-rows: auto auto auto; }
      .snake-board { min-height: 280px; }
      .snake-pad { grid-template-columns: repeat(3, 48px); grid-template-rows: repeat(2, 42px); }
      .snake-pad button { padding: 6px; font-size: 0.9rem; }
      .chat-wrap { height: auto; grid-template-columns: 1fr; }
      .chat-main { min-height: 520px; }
      .chat-actions { flex-wrap: wrap; }
      .chat-send, #geminiClearBtn, #geminiApplyBtn { min-width: 0; }
      .chat-input-meta { flex-direction: column; align-items: stretch; }
    }
    @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; transition-duration: 0.01ms !important; scroll-behavior: auto !important; } }

    /* Polished card-style overrides to match provided design */
    body {
      /* Warmer, richer paper-like background with subtle noise */
      background-color: #fff6ee;
      background-image:
        radial-gradient(900px 420px at 8% 12%, rgba(255,220,185,0.9), transparent 18%),
        radial-gradient(800px 380px at 92% 84%, rgba(255,230,245,0.75), transparent 16%),
        linear-gradient(180deg, #fff9f5 0%, #fff4ea 35%, #f8efe6 100%),
        repeating-linear-gradient(0deg, rgba(0,0,0,0.01) 0px, rgba(0,0,0,0.01) 1px, rgba(255,255,255,0) 1px, rgba(255,255,255,0) 6px);
      background-blend-mode: normal, normal, normal, overlay;
      color: var(--text);
      font-family: 'Noto Sans TC', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial;
      padding: 28px 20px;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .app { max-width: 1180px; margin: 0 auto; display: grid; gap: 24px; }
    #pageArt { position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: 0.96; }
    body > main.app, body > .app { position: relative; z-index: 2; }

    .hero {
      background: linear-gradient(180deg, rgba(255,253,248,0.98), rgba(252,247,242,0.96));
      background-image: radial-gradient(circle at 10% 10%, rgba(255,240,220,0.6), transparent 12%), linear-gradient(180deg, rgba(255,253,248,0.98), rgba(252,247,242,0.96));
      border-radius: 20px;
      padding: 30px 28px;
      box-shadow: var(--shadow-soft);
      display: block;
      border: 1px solid rgba(24,20,16,0.03);
      background-blend-mode: normal, multiply;
    }
    .hero h1 { font-family: 'Noto Serif TC', serif; font-size: clamp(2.4rem, 6vw, 4rem); margin: 0 0 8px 0; letter-spacing: 0.02em; }
    .hero p { color: #6b5a49; font-size: 1.05rem; margin: 8px 0 14px 0; }

    .menu { display: grid; grid-template-columns: repeat(2, minmax(340px, 1fr)); gap: 26px; align-items: start; }
    .menu-card {
      background: linear-gradient(180deg, rgba(255,255,255,0.85), rgba(252,247,242,0.9));
      border-radius: 28px;
      padding: 22px 24px;
      box-shadow: 0 20px 40px rgba(28,20,12,0.08), var(--shadow-soft);
      display: flex;
      flex-direction: column;
      gap: 14px;
      min-height: 220px;
      border: 1px solid rgba(26,22,18,0.04);
      background-image: linear-gradient(180deg, rgba(255,255,255,0.9), rgba(250,245,240,0.95)), radial-gradient(circle at 85% 10%, rgba(245,230,245,0.28), transparent 22%);
      background-blend-mode: normal, overlay;
      position: relative;
    }
    .menu-card h2 { margin: 0; font-size: 1.35rem; letter-spacing: -0.01em; }
    .preview { border-radius: 18px; overflow: hidden; border: 1px solid rgba(26,24,20,0.04); background: linear-gradient(180deg,#f7fbff,#eef6ff); padding: 0; position: relative; height: 170px; background-image: linear-gradient(180deg, rgba(255,255,255,0.92), rgba(246,243,240,0.96)), radial-gradient(circle at 12% 18%, rgba(255,240,220,0.5), transparent 18%); background-blend-mode: normal, overlay; }
    .preview[data-title]::before { content: attr(data-title); position: absolute; top: 14px; left: 14px; font-weight:800; background: rgba(255,255,255,0.95); padding:8px 12px; border-radius:999px; box-shadow: 0 6px 18px rgba(20,18,16,0.06); z-index:2; font-size:0.95rem; }
    .preview .score-badge { position: absolute; right: 12px; bottom: 12px; z-index:3; background: #fff; color: var(--accent); padding:6px 10px; border-radius:14px; font-weight:800; box-shadow: 0 6px 18px rgba(20,18,16,0.06); }
    .tag { background: rgba(255,255,255,0.92); padding:8px 12px; border-radius:999px; margin-right:10px; display:inline-block; font-weight:800; color: #39403a; border: 1px solid rgba(30,26,22,0.04); }

    /* Decorative card blobs and game backgrounds */
    .menu-card { position: relative; overflow: visible; }
    .menu-card::before {
      content: '';
      position: absolute;
      inset: -18px -22px auto auto;
      width: 240px;
      height: 150px;
      background: radial-gradient(circle at 18% 24%, rgba(255,235,210,0.88), rgba(255,235,210,0.0) 38%), radial-gradient(circle at 92% 80%, rgba(245,230,245,0.42), rgba(245,230,245,0) 42%);
      border-radius: 50%;
      z-index: 0;
      pointer-events: none;
      transform: translate(10px, 18px) rotate(-4deg);
      filter: blur(6px) saturate(1.02);
    }
    .menu-card > * { position: relative; z-index: 1; }

    /* Preview panels get soft vignette and subtle paper texture */
    .preview { background-image: radial-gradient(circle at 8% 12%, rgba(255,250,240,0.62), transparent 18%), linear-gradient(180deg,#fbfdff,#f3f6ff); box-shadow: inset 0 1px 0 rgba(255,255,255,0.6); border: 1px solid rgba(30,24,18,0.04); background-size: cover; }
    .preview::after { content: ''; position: absolute; inset: 0; pointer-events: none; background-image: repeating-linear-gradient(45deg, rgba(0,0,0,0.01) 0 1px, transparent 1px 8px); border-radius: 12px; opacity: 0.06; }

    /* Whack-a-mole live board */
    #board {
      border-radius: 12px;
      background: linear-gradient(180deg,#eaf7ff 0%, #d8f0ff 45%, #c9e6d4 100%);
      box-shadow: inset 0 -6px 40px rgba(0,0,0,0.08), 0 8px 22px rgba(20,18,16,0.06);
      border: 1px solid rgba(20,20,18,0.04);
      position: relative;
      overflow: hidden;
    }
    #board::before { content: ''; position: absolute; inset: 0; background-image: radial-gradient(circle at 50% 10%, rgba(255,255,255,0.12), transparent 25%), linear-gradient(180deg, rgba(255,255,255,0.02), rgba(0,0,0,0.02)); pointer-events: none; mix-blend-mode: overlay; }

    /* Snake board: subtle grid + vignette */
    #snakeBoard {
      border-radius: 14px;
      background-color: #0b3629;
      background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px), radial-gradient(circle at 12% 12%, rgba(255,255,255,0.02), transparent 36%);
      background-size: 32px 32px, 32px 32px, 100% 100%;
      background-position: 0 0, 0 0, 0 0;
      box-shadow: inset 0 12px 40px rgba(0,0,0,0.18), 0 10px 24px rgba(8,14,12,0.12);
      border: 1px solid rgba(255,255,255,0.02);
    }
    #snakeBoard .grid-glow { position: absolute; inset: 0; pointer-events: none; background-image: radial-gradient(circle at 20% 10%, rgba(120,220,170,0.06), transparent 18%); mix-blend-mode: screen; }

    /* Gemini chat window decorative background */
    .chat-window {
      background-image: linear-gradient(180deg, rgba(255,255,255,0.94), rgba(252,249,246,0.96)), radial-gradient(circle at 90% 10%, rgba(245,230,245,0.22), transparent 20%), repeating-linear-gradient(135deg, rgba(0,0,0,0.01) 0 1px, transparent 1px 8px);
      border-radius: 18px;
      border: 1px solid rgba(26,22,18,0.03);
      box-shadow: 0 10px 20px rgba(12,10,8,0.04) inset;
    }

    .credit { color: var(--muted); }
  </style>
</head>
<body>

        <radialGradient id="gSoft" cx="20%" cy="20%">

  <main class="app">
    <section class="hero">
      <div class="hero-art" aria-hidden="true">
        <svg width="220" height="120" viewBox="0 0 440 240" fill="none" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMinYMin meet">
          <defs>
            <linearGradient id="g1" x1="0" x2="1">
              <stop offset="0" stop-color="#fff3cf" />
              <stop offset="1" stop-color="#f5e6ff" />

          </defs>
          <rect x="8" y="8" width="424" height="224" rx="28" fill="url(#g1)" opacity="0.95" />
          <circle cx="360" cy="40" r="40" fill="#fff4e6" />
          <circle cx="36" cy="200" r="84" fill="#fff0ef" />
        </svg>
      </div>
      <h1>我是施沛辰。</h1>
        <p>我正在持續累積前端與互動設計作品，下面先做成一個<strong>程序選擇中心</strong>，可以從首頁直接挑選要進入的遊戲。這版保留你原本的打地鼠，並新增一個可玩的貪吃蛇。</p>
      <div class="hero-actions">
        <a class="action hero-link" href="#calcView">直接前往工程計算機</a>
      </div>
    </section>

    <section class="menu" id="menuView" aria-label="程序選擇">
      <article class="menu-card">
        <div>
          <h2>打地鼠</h2>
          <p>以短時間反應與點擊準度為核心，讓玩家在不斷出現的目標中追求更高分數，適合快速上手與反覆挑戰。</p>
        </div>
        <div class="tags">
          <span class="tag">反應速度</span>
          <span class="tag">點擊互動</span>
          <span class="tag">節奏遊玩</span>
        </div>
        <div class="preview whack-preview" data-title="Whack-a-Mole">
          <div class="whack-scene" aria-hidden="true">
            <svg viewBox="0 0 800 360" width="100%" height="160" xmlns="http://www.w3.org/2000/svg">
              <defs>
                <linearGradient id="sky" x1="0" x2="0" y1="0" y2="1">
                  <stop offset="0" stop-color="#cfe9ff" />
                  <stop offset="1" stop-color="#e6f7ff" />
                </linearGradient>
              </defs>
              <rect x="0" y="0" width="800" height="360" rx="20" fill="url(#sky)" />
              <rect x="0" y="220" width="800" height="140" rx="20" fill="#9ed07a" />
              <!-- holes -->
              <g fill="#6b4a3a">
                <ellipse cx="180" cy="260" rx="70" ry="36" />
                <ellipse cx="400" cy="260" rx="70" ry="36" />
