<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <title>打地鼠遊戲</title>
  <style>
    :root {
      --bg1: #07111f;
      --bg2: #0f1b33;
      --panel: rgba(8, 15, 28, 0.72);
      --panel-border: rgba(255, 255, 255, 0.12);
      --text: #eef4ff;
      --muted: #a9b5cc;
      --accent: #ffd36e;
      --accent-2: #7dd3fc;
      --good: #67e8a8;
      --danger: #fb7185;
      --hole: #1b2640;
      --hole-shadow: #08111f;
      --mole: #8b5a2b;
      --mole-face: #f8d7b0;
      --mole-belly: #a56a34;
      --shine: rgba(255, 255, 255, 0.2);
      --radius: 24px;
      --ui-radius: 18px;
      --shadow: 0 18px 50px rgba(0, 0, 0, 0.35);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at top, rgba(125, 211, 252, 0.18), transparent 32%),
        radial-gradient(circle at 85% 18%, rgba(251, 191, 36, 0.12), transparent 20%),
        linear-gradient(180deg, var(--bg2), var(--bg1));
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow: hidden;
    }

    body {
      min-height: 100svh;
      display: flex;
      align-items: stretch;
      justify-content: center;
      padding: max(10px, env(safe-area-inset-top)) max(10px, env(safe-area-inset-right)) max(10px, env(safe-area-inset-bottom)) max(10px, env(safe-area-inset-left));
    }

    .app {
      width: min(100%, 760px);
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      gap: 12px;
      min-height: 100%;
    }

    .topbar,
    .hud,
    .footer,
    .board-wrap {
      border: 1px solid var(--panel-border);
      background: var(--panel);
      backdrop-filter: blur(14px);
      box-shadow: var(--shadow);
    }

    .topbar {
      border-radius: calc(var(--radius) + 4px);
      padding: 16px 16px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .title-block h1 {
      margin: 0;
      font-size: clamp(1.3rem, 4vw, 2rem);
      letter-spacing: 0.04em;
    }

    .title-block p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.06);
      color: var(--text);
      border: 1px solid rgba(255, 255, 255, 0.1);
      font-weight: 700;
      font-size: 0.92rem;
      white-space: nowrap;
    }

    .hud {
      border-radius: var(--ui-radius);
      padding: 12px;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .stat {
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      padding: 12px 10px;
      text-align: center;
    }

    .stat label {
      display: block;
      color: var(--muted);
      font-size: 0.82rem;
      margin-bottom: 6px;
    }

    .stat strong {
      display: block;
      font-size: clamp(1.2rem, 4vw, 1.7rem);
      color: var(--text);
    }

    .board-wrap {
      border-radius: calc(var(--radius) + 6px);
      padding: clamp(12px, 2.2vw, 18px);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 0;
      position: relative;
      overflow: hidden;
    }

    .board-wrap::before {
      content: "";
      position: absolute;
      inset: auto -20% -30% -20%;
      height: 55%;
      background: radial-gradient(circle at center, rgba(103, 232, 168, 0.15), transparent 62%);
      pointer-events: none;
    }

    .board {
      width: min(100%, 560px);
      aspect-ratio: 1 / 1;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: clamp(8px, 1.8vw, 14px);
      position: relative;
      z-index: 1;
    }

    .hole {
      position: relative;
      border: 0;
      padding: 0;
      border-radius: 22px;
      background: linear-gradient(180deg, #263557, #18233a 68%, #10192b);
      box-shadow:
        inset 0 10px 18px rgba(255, 255, 255, 0.06),
        inset 0 -10px 18px rgba(0, 0, 0, 0.3),
        0 10px 22px rgba(0, 0, 0, 0.24);
      overflow: hidden;
      touch-action: manipulation;
    }

    .hole::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: 12%;
      width: 86%;
      height: 22%;
      transform: translateX(-50%);
      border-radius: 50%;
      background: radial-gradient(ellipse at center, rgba(0, 0, 0, 0.72) 0%, rgba(0, 0, 0, 0.94) 70%);
      box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.7);
    }

    .hole .mole {
      position: absolute;
      left: 50%;
      bottom: -2%;
      width: 68%;
      aspect-ratio: 1 / 1.05;
      transform: translate(-50%, 102%);
      transition: transform 120ms ease-out;
      pointer-events: none;
      filter: drop-shadow(0 10px 8px rgba(0, 0, 0, 0.24));
    }

    .hole.up .mole {
      transform: translate(-50%, 10%);
    }

    .mole .body {
      position: absolute;
      inset: 18% 6% 0 6%;
      border-radius: 48% 48% 42% 42%;
      background: linear-gradient(180deg, #b8793e, #8b5a2b 62%, #68401d);
      border: 3px solid rgba(255, 255, 255, 0.08);
    }

    .mole .face {
      position: absolute;
      left: 50%;
      top: 16%;
      width: 72%;
      height: 54%;
      transform: translateX(-50%);
      border-radius: 46% 46% 42% 42%;
      background: linear-gradient(180deg, #ffe5c8, var(--mole-face));
      box-shadow: inset 0 -8px 0 rgba(0, 0, 0, 0.06);
    }

    .mole .eyes,
    .mole .nose,
    .mole .mouth,
    .mole .blush {
      position: absolute;
      background: #111827;
    }

    .mole .eyes {
      top: 36%;
      left: 28%;
      width: 10%;
      height: 10%;
      border-radius: 50%;
      box-shadow: 26px 0 0 #111827;
    }

    .mole .nose {
      left: 50%;
      top: 52%;
      width: 16%;
      height: 11%;
      border-radius: 50% 50% 40% 40%;
      transform: translateX(-50%);
      background: #e85d75;
    }

    .mole .mouth {
      left: 50%;
      top: 61%;
      width: 18%;
      height: 5%;
      transform: translateX(-50%);
      border-radius: 999px;
      background: #3f1f0f;
      box-shadow: none;
    }

    .mole .blush {
      top: 47%;
      left: 16%;
      width: 10%;
      height: 6%;
      border-radius: 50%;
      background: rgba(255, 122, 145, 0.28);
      box-shadow: 38px 0 0 rgba(255, 122, 145, 0.28);
    }

    .hole.hit {
      animation: pop 180ms ease-out;
    }

    .hole.hit .mole {
      transform: translate(-50%, 6%) scale(0.96);
    }

    @keyframes pop {
      0% { transform: scale(1); }
      50% { transform: scale(1.02); }
      100% { transform: scale(1); }
    }

    .footer {
      border-radius: var(--ui-radius);
      padding: 12px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }

    .footer .controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button.action {
      border: 0;
      border-radius: 14px;
      padding: 12px 16px;
      font: inherit;
      font-weight: 800;
      color: #06101d;
      background: linear-gradient(135deg, var(--accent), #f7c04b);
      box-shadow: 0 10px 22px rgba(247, 192, 75, 0.28);
      cursor: pointer;
      min-width: 112px;
    }

    button.action.secondary {
      color: var(--text);
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow: none;
    }

    button.action:active,
    .hole:active {
      transform: translateY(1px) scale(0.99);
    }

    .credit {
      color: var(--muted);
      font-size: 0.92rem;
      line-height: 1.4;
    }

    .overlay {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      background: rgba(3, 8, 18, 0.58);
      backdrop-filter: blur(10px);
      padding: 18px;
      z-index: 20;
    }

    .overlay[hidden] {
      display: none;
    }

    .card {
      width: min(100%, 430px);
      border-radius: 28px;
      padding: 22px;
      background: linear-gradient(180deg, rgba(14, 25, 46, 0.98), rgba(8, 15, 28, 0.98));
      border: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow: 0 30px 70px rgba(0, 0, 0, 0.45);
      text-align: center;
    }

    .card h2 {
      margin: 0 0 8px;
      font-size: clamp(1.6rem, 5vw, 2.2rem);
    }

    .card p {
      margin: 0 0 18px;
      color: var(--muted);
      line-height: 1.6;
    }

    .card .big-score {
      font-size: clamp(2rem, 7vw, 3rem);
      font-weight: 900;
      color: var(--accent);
      margin: 8px 0 14px;
    }

    .pulse {
      animation: pulse 0.25s ease-out;
    }

    @keyframes pulse {
      from { transform: scale(1); }
      50% { transform: scale(1.12); }
      to { transform: scale(1); }
    }

    @media (max-width: 480px) {
      body {
        overflow: auto;
      }

      .app {
        gap: 10px;
      }

      .topbar {
        padding: 14px 14px 12px;
        flex-direction: column;
        align-items: flex-start;
      }

      .hud {
        grid-template-columns: repeat(3, minmax(0, 1fr));
        padding: 10px;
      }

      .stat {
        padding: 10px 8px;
      }

      .footer {
        flex-direction: column;
        align-items: stretch;
      }

      .footer .controls {
        width: 100%;
      }

      button.action {
        flex: 1 1 0;
        min-width: 0;
      }

      .credit {
        text-align: center;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
        scroll-behavior: auto !important;
      }
    }
  </style>
</head>
<body>
  <main class="app" aria-label="打地鼠遊戲">
    <header class="topbar">
      <div class="title-block">
        <h1>打地鼠</h1>
        <p>手機直式最佳化，點擊跳出的地鼠拿高分。</p>
      </div>
      <div class="chip" id="audioState">音效：開啟</div>
    </header>

    <section class="hud" aria-label="遊戲資訊">
      <div class="stat">
        <label>分數</label>
        <strong id="score">0</strong>
      </div>
      <div class="stat">
        <label>剩餘時間</label>
        <strong id="time">30</strong>
      </div>
      <div class="stat">
        <label>最高分</label>
        <strong id="best">0</strong>
      </div>
    </section>

    <section class="board-wrap">
      <div class="board" id="board" aria-label="地鼠洞洞板"></div>
    </section>

    <footer class="footer">
      <div class="controls">
        <button class="action" id="startBtn">開始遊戲</button>
        <button class="action secondary" id="soundBtn" type="button">切換音效</button>
      </div>
      <div class="credit">設計者：施沛辰</div>
    </footer>
  </main>

  <div class="overlay" id="overlay">
    <div class="card">
      <h2>準備好了嗎？</h2>
      <p>地鼠會隨機從洞裡跳出來，快速點擊牠們。遊戲同時支援觸控與滑鼠，並內建音效。</p>
      <div class="big-score" id="overlayScore">0</div>
      <button class="action" id="playBtn">開始挑戰</button>
    </div>
  </div>

  <script>
    (() => {
      const board = document.getElementById('board');
      const scoreEl = document.getElementById('score');
      const timeEl = document.getElementById('time');
      const bestEl = document.getElementById('best');
      const startBtn = document.getElementById('startBtn');
      const playBtn = document.getElementById('playBtn');
      const soundBtn = document.getElementById('soundBtn');
      const soundState = document.getElementById('audioState');
      const overlay = document.getElementById('overlay');
      const overlayScore = document.getElementById('overlayScore');

      const HOLE_COUNT = 9;
      const GAME_TIME = 30;
      const MIN_POP = 420;
      const MAX_POP = 950;
      const GAP_MIN = 240;
      const GAP_MAX = 620;

      let holes = [];
      let score = 0;
      let best = Number(localStorage.getItem('whack-best') || 0);
      let timeLeft = GAME_TIME;
      let gameRunning = false;
      let activeHole = null;
      let activeTimeout = null;
      let nextTimeout = null;
      let timerInterval = null;
      let soundEnabled = true;
      let audioCtx = null;

      bestEl.textContent = best;
      timeEl.textContent = timeLeft;

      function createMoleMarkup() {
        return `
          <div class="mole" aria-hidden="true">
            <div class="body"></div>
            <div class="face">
              <div class="eyes"></div>
              <div class="blush"></div>
              <div class="nose"></div>
              <div class="mouth"></div>
            </div>
          </div>
        `;
      }

      function buildBoard() {
        board.innerHTML = '';
        holes = Array.from({ length: HOLE_COUNT }, (_, index) => {
          const button = document.createElement('button');
          button.type = 'button';
          button.className = 'hole';
          button.setAttribute('aria-label', `第 ${index + 1} 個洞`);
          button.dataset.index = String(index);
          button.innerHTML = createMoleMarkup();
          button.addEventListener('pointerdown', () => hitHole(button));
          board.appendChild(button);
          return button;
        });
      }

      function getAudio() {
        if (!audioCtx) {
          const AudioContextClass = window.AudioContext || window.webkitAudioContext;
          if (!AudioContextClass) return null;
          audioCtx = new AudioContextClass();
        }
        if (audioCtx.state === 'suspended') {
          audioCtx.resume();
        }
        return audioCtx;
      }

      function playTone({ frequency, duration = 0.12, type = 'sine', gain = 0.06, slideTo = null }) {
        if (!soundEnabled) return;
        const ctx = getAudio();
        if (!ctx) return;

        const oscillator = ctx.createOscillator();
        const gainNode = ctx.createGain();
        oscillator.type = type;
        oscillator.frequency.value = frequency;
        if (slideTo !== null) {
          oscillator.frequency.exponentialRampToValueAtTime(slideTo, ctx.currentTime + duration);
        }
        gainNode.gain.value = 0.0001;
        gainNode.gain.exponentialRampToValueAtTime(gain, ctx.currentTime + 0.01);
        gainNode.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + duration);
        oscillator.connect(gainNode).connect(ctx.destination);
        oscillator.start();
        oscillator.stop(ctx.currentTime + duration + 0.02);
      }

      function hitSound() {
        playTone({ frequency: 520, slideTo: 820, duration: 0.09, type: 'triangle', gain: 0.07 });
      }

      function popSound() {
        playTone({ frequency: 260, slideTo: 180, duration: 0.12, type: 'sine', gain: 0.05 });
      }

      function startSound() {
        playTone({ frequency: 330, slideTo: 660, duration: 0.16, type: 'triangle', gain: 0.06 });
      }

      function endSound() {
        playTone({ frequency: 220, slideTo: 110, duration: 0.28, type: 'sawtooth', gain: 0.05 });
      }

      function missSound() {
        playTone({ frequency: 150, slideTo: 120, duration: 0.08, type: 'square', gain: 0.035 });
      }

      function updateHud() {
        scoreEl.textContent = score;
        timeEl.textContent = timeLeft;
        bestEl.textContent = best;
        overlayScore.textContent = score;
      }

      function setAudioState() {
        soundState.textContent = `音效：${soundEnabled ? '開啟' : '關閉'}`;
        soundBtn.textContent = soundEnabled ? '關閉音效' : '開啟音效';
      }

      function clearTimers() {
        if (activeTimeout) {
          clearTimeout(activeTimeout);
          activeTimeout = null;
        }
        if (nextTimeout) {
          clearTimeout(nextTimeout);
          nextTimeout = null;
        }
        if (timerInterval) {
          clearInterval(timerInterval);
          timerInterval = null;
        }
      }

      function hideAllMoles() {
        holes.forEach((hole) => hole.classList.remove('up', 'hit'));
        activeHole = null;
      }

      function scheduleNextPop() {
        if (!gameRunning) return;
        const delay = rand(GAP_MIN, GAP_MAX);
        nextTimeout = setTimeout(showRandomHole, delay);
      }

      function rand(min, max) {
        return Math.floor(Math.random() * (max - min + 1)) + min;
      }

      function showRandomHole() {
        if (!gameRunning) return;
        hideAllMoles();
        const available = holes.filter((hole) => hole !== activeHole);
        const hole = available[Math.floor(Math.random() * available.length)];
        activeHole = hole;
        hole.classList.add('up');
        popSound();

        const visibleFor = rand(MIN_POP, MAX_POP);
        activeTimeout = setTimeout(() => {
          hole.classList.remove('up');
          activeHole = null;
          scheduleNextPop();
        }, visibleFor);
      }

      function hitHole(hole) {
        if (!gameRunning) {
          missSound();
          return;
        }
        if (hole !== activeHole || !hole.classList.contains('up')) {
          missSound();
          return;
        }

        score += 1;
        hole.classList.add('hit');
        hole.classList.remove('up');
        activeHole = null;
        scoreEl.classList.remove('pulse');
        void scoreEl.offsetWidth;
        scoreEl.classList.add('pulse');
        hitSound();
        updateHud();

        if (activeTimeout) {
          clearTimeout(activeTimeout);
          activeTimeout = null;
        }
        scheduleNextPop();
      }

      function startGame() {
        clearTimers();
        score = 0;
        timeLeft = GAME_TIME;
        gameRunning = true;
        updateHud();
        overlay.hidden = true;
        hideAllMoles();
        setAudioState();
        startSound();

        timerInterval = setInterval(() => {
          timeLeft -= 1;
          updateHud();
          if (timeLeft <= 0) {
            endGame();
          }
        }, 1000);

        showRandomHole();
      }

      function endGame() {
        if (!gameRunning) return;
        gameRunning = false;
        clearTimers();
        hideAllMoles();
        if (score > best) {
          best = score;
          localStorage.setItem('whack-best', String(best));
        }
        updateHud();
        overlay.hidden = false;
        endSound();
      }

      function toggleSound() {
        soundEnabled = !soundEnabled;
        setAudioState();
        if (soundEnabled) {
          startSound();
        }
      }

      startBtn.addEventListener('click', startGame);
      playBtn.addEventListener('click', startGame);
      soundBtn.addEventListener('click', toggleSound);

      document.addEventListener('visibilitychange', () => {
        if (document.hidden && gameRunning) {
          endGame();
        }
      });

      window.addEventListener('beforeunload', () => {
        clearTimers();
      });

      buildBoard();
      updateHud();
      setAudioState();
      overlay.hidden = false;
    })();
  </script>
</body>
</html>
