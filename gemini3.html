<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>200題 英文單字測驗系統</title>
    <style>
        :root {
            --bg-color: #fcf8f2;       /* 暖米色背景 */
            --panel-bg: #ffffff;
            --text-main: #4a3e3d;      /* 深暖調字體 */
            --text-muted: #8c7e7c;
            --accent-color: #d97743;   /* 主題橘色 */
            --accent-hover: #bd5e2b;
            --border-color: #f3ece4;
            --success-color: #2e7d32;  /* 答對綠色 */
            --error-color: #c62828;    /* 答錯紅色 */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .exam-container {
            width: 100%;
            max-width: 650px;
            background-color: var(--panel-bg);
            border-radius: 24px;
            border: 1px solid var(--border-color);
            box-shadow: 0 8px 30px rgba(74, 62, 61, 0.05);
            padding: 30px;
            display: flex;
            flex-direction: column;
        }

        .exam-header {
            margin-bottom: 24px;
        }
        .progress-info {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 8px;
            font-weight: 600;
        }
        .progress-bar-bg {
            width: 100%;
            height: 8px;
            background-color: #f5ede4;
            border-radius: 4px;
            overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%;
            width: 0%;
            background-color: var(--accent-color);
            transition: width 0.3s ease;
        }

        .question-section {
            margin-bottom: 24px;
        }
        .question-text {
            font-size: 20px;
            font-weight: 700;
            line-height: 1.4;
            margin-bottom: 20px;
        }

        .options-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .option-btn {
            width: 100%;
            padding: 14px 20px;
            text-align: left;
            background-color: #fffbf7;
            border: 1px solid var(--border-color);
            border-radius: 16px;
            font-size: 16px;
            color: var(--text-main);
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s ease;
        }
        .option-btn:hover:not(:disabled) {
            border-color: var(--accent-color);
            background-color: #fff5ee;
        }
        
        .option-btn.correct {
            background-color: #e8f5e9 !important;
            border-color: var(--success-color) !important;
            color: var(--success-color) !important;
            font-weight: 700;
        }
        .option-btn.wrong {
            background-color: #ffebee !important;
            border-color: var(--error-color) !important;
            color: var(--error-color) !important;
        }

        .action-section {
            margin-top: 20px;
            display: flex;
            justify-content: flex-end;
        }
        .next-btn {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 12px 32px;
            border-radius: 16px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            display: none;
            box-shadow: 0 4px 12px rgba(217, 119, 67, 0.15);
        }
        .next-btn:hover {
            background-color: var(--accent-hover);
        }

        .result-section {
            text-align: center;
            display: none;
        }
        .result-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 16px;
        }
        .score-display {
            font-size: 48px;
            font-weight: 800;
            color: var(--accent-color);
            margin-bottom: 24px;
        }
        .restart-btn {
            background-color: var(--text-main);
            color: white;
            border: none;
            padding: 12px 32px;
            border-radius: 16px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
        }

        @media screen and (max-width: 768px) {
            body { padding: 0; }
            .exam-container {
                border-radius: 0;
                border: none;
                min-height: 100vh;
                padding: 24px 16px;
            }
            .question-text { font-size: 18px; }
            .option-btn { font-size: 15px; padding: 12px 16px; }
        }
    </style>
</head>

        let currentQuestionIndex = 0;
        let score = 0;
        let hasAnswered = false;

        const quizContainer = document.getElementById('quizContainer');
        const resultContainer = document.getElementById('resultContainer');
        const questionText = document.getElementById('questionText');
        const optionsGroup = document.getElementById('optionsGroup');
        const nextBtn = document.getElementById('nextBtn');
        const progressText = document.getElementById('progressText');
        const progressBar = document.getElementById('progressBar');
        const scoreText = document.getElementById('scoreText');
        const detailedResult = document.getElementById('detailedResult');

        function initExam() {
            currentQuestionIndex = 0;
            score = 0;
            quizContainer.style.display = 'block';
            resultContainer.style.display = 'none';
            showQuestion();
        }

        function showQuestion() {
            hasAnswered = false;
            nextBtn.style.display = 'none';
            optionsGroup.innerHTML = '';

            const currentQuiz = quizData[currentQuestionIndex];
            
            progressText.textContent = `第 ${currentQuestionIndex + 1} / ${quizData.length} 題`;
            const progressPercent = ((currentQuestionIndex + 1) / quizData.length) * 100;
            progressBar.style.width = `${progressPercent}%`;

            questionText.textContent = currentQuiz.q;

            currentQuiz.o.forEach((option, index) => {
                const button = document.createElement('button');
                button.classList.add('option-btn');
                button.textContent = option;
                button.addEventListener('click', () => checkAnswer(index, button));
                optionsGroup.appendChild(button);
            });
        }

        function checkAnswer(selectedIndex, clickedButton) {
            if (hasAnswered) return;
            hasAnswered = true;

            const currentQuiz = quizData[currentQuestionIndex];
            const correctIndex = currentQuiz.a;
            const allButtons = optionsGroup.querySelectorAll('.option-btn');

            allButtons.forEach(btn => btn.disabled = true);

            if (selectedIndex === correctIndex) {
                clickedButton.classList.add('correct');
                score++;
            } else {
                clickedButton.classList.add('wrong');
                allButtons[correctIndex].classList.add('correct');
            }

            nextBtn.style.display = 'block';
            if (currentQuestionIndex === quizData.length - 1) {
                nextBtn.textContent = "看測驗結果 ➔";
            } else {
                nextBtn.textContent = "下一題 ➔";
            }
        }

        nextBtn.addEventListener('click', () => {
            currentQuestionIndex++;
            if (currentQuestionIndex < quizData.length) {
                showQuestion();
            } else {
                showResult();
            }
        });

        function showResult() {
            quizContainer.style.display = 'none';
            resultContainer.style.display = 'block';

            const finalScore = Math.round((score / quizData.length) * 100);
            scoreText.textContent = `${finalScore} 分`;
            detailedResult.textContent = `總共 ${quizData.length} 題，你答對了 ${score} 題。`;
        }

        function restartExam() {
            initExam();
        }

        window.DOMContentLoaded = initExam();
