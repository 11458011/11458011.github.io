<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sam 聊天視窗</title>
    <style>
        :root {
            --bg-color: #fcf8f2;       /* 圖片中的暖米色背景 */
            --panel-bg: #ffffff;
            --card-bg: #fffbf7;        /* 側邊欄卡片的微黃底色 */
            --accent-orange: #d97743;  /* 圖片中的暖橘色 */
            --accent-orange-hover: #bd5e2b;
            --text-main: #4a3e3d;      /* 帶有暖調的深色字體 */
            --text-muted: #8c7e7c;
            --border-color: #f3ece4;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            -webkit-tap-highlight-color: transparent; /* 移除手機點擊高亮 */
        }

        body {
            background-color: var(--bg-color);
            display: flex;
            height: 100vh;
            padding: 16px;
            gap: 16px;
            color: var(--text-main);
            overflow: hidden; /* 防止身體捲動，讓聊天室捲動 */
        }

        /* 左側設定面板 - 預設在手機上隱藏 */
        .sidebar {
            width: 280px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            overflow-y: auto;
            padding-right: 4px;
            flex-shrink: 0;
            transition: transform 0.3s ease;
        }

        /* 手機模式下的隱藏邏輯 */
        @media (max-width: 768px) {
            body {
                padding: 0; /* 手機全螢幕 */
                gap: 0;
            }
            .sidebar {
                position: fixed;
                left: 0;
                top: 0;
                height: 100vh;
                background-color: var(--bg-color);
                z-index: 100;
                transform: translateX(-100%); /* 隱藏 */
                padding: 20px;
                box-shadow: 2px 0 10px rgba(0,0,0,0.1);
            }
            .sidebar.active {
                transform: translateX(0); /* 顯示 */
            }
        }

        /* 側邊欄卡片通用樣式 */
        .sidebar-card {
            background-color: var(--card-bg);
            border-radius: 20px;
            padding: 16px;
            border: 1px solid var(--border-color);
        }

        /* 頂部標題卡片 */
        .header-card {
            display: flex;
            gap: 12px;
            align-items: flex-start;
        }
        .orange-avatar {
            background-color: var(--accent-orange);
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
            flex-shrink: 0;
        }
        .header-card .title-area h2 {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 4px;
        }
        .header-card .title-area p {
            font-size: 12px;
            color: var(--text-muted);
            line-height: 1.4;
        }

        /* 聊天概況卡片 */
        .card-title {
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 12px;
        }
        .status-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        .status-item {
            background: #fff;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 10px;
        }
        .status-item .label {
            font-size: 11px;
            color: var(--text-muted);
            margin-bottom: 4px;
        }
        .status-item .value {
            font-size: 14px;
            font-weight: 700;
        }

        /* 快速指令卡片 */
        .tag-group {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        .cmd-tag {
            background: #fff;
            border: 1px solid var(--border-color);
            padding: 6px 12px;
            border-radius: 14px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        .cmd-tag:hover {
            border-color: var(--accent-orange);
            color: var(--accent-orange);
        }

        /* ntfy 設定卡片 */
        .input-group {
            margin-bottom: 10px;
        }
        .input-group label {
            display: block;
            font-size: 12px;
            font-weight: 700;
            margin-bottom: 6px;
        }
        .input-text {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            font-size: 14px;
            outline: none;
            background: #fff;
        }
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            font-weight: 700;
            margin-bottom: 12px;
        }
        .checkbox-group input {
            width: 14px;
            height: 14px;
            accent-color: var(--accent-orange);
        }
        .action-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .btn-sm {
            padding: 6px 12px;
            border: 1px solid var(--border-color);
            background: #fff;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
        }
        .btn-sm:hover { background: #faf5ef; }
        .ntfy-status {
            font-size: 11px;
            color: var(--text-muted);
        }

        /* 聯絡人卡片 */
        .contact-box {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #fff;
            padding: 8px 12px;
            border-radius: 14px;
            border: 1px solid var(--border-color);
            position: relative;
        }
        .ux-avatar {
            background-color: #d97743;
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 700;
        }
        .contact-info h4 { font-size: 13px; font-weight: 700; }
        .contact-info p { font-size: 11px; color: var(--text-muted); }
        .dot {
            width: 8px;
            height: 8px;
            background-color: #eab308;
            border-radius: 50%;
            position: absolute;
            right: 12px;
        }

        /* 右側聊天主視窗 */
        .chat-container {
            flex: 1;
            background-color: var(--panel-bg);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            border: 1px solid var(--border-color);
            overflow: hidden;
            height: 100%;
        }

        @media (max-width: 768px) {
            .chat-container {
                border-radius: 0;
                border: none;
            }
        }

        /* 頂部導覽列 */
        .chat-header {
            padding: 12px 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        /* 手機板設定開關按鈕 */
        .menu-toggle {
            display: none;
            background: none;
            border: none;
            font-size: 20px;
            color: var(--text-main);
            cursor: pointer;
            padding: 5px;
        }

        @media (max-width: 768px) {
            .menu-toggle { display: block; }
            .header-left .cyan-avatar { width: 30px; height: 30px; font-size: 12px; }
            .user-status h3 { font-size: 13px; }
            .chat-header { padding: 10px 15px; }
        }

        .cyan-avatar {
            background-color: #72b2b4;
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
        }
        .user-status h3 { font-size: 14px; font-weight: 700; }
        .user-status p { font-size: 11px; color: var(--text-muted); }
        
        .header-right {
            display: flex;
            gap: 6px;
        }
        .header-btn {
            background: #fdfbf7;
            border: 1px solid var(--border-color);
            padding: 6px 12px;
            border-radius: 14px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
        }
        @media (max-width: 768px) {
            .header-right { display: none; } /* 隱藏更多按鈕 */
        }

        /* 訊息區 */
        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            -webkit-overflow-scrolling: touch; /* 手機流暢捲動 */
        }
        .date-divider {
            align-self: center;
            background: #f5ede4;
            padding: 2px 10px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 700;
            color: var(--text-muted);
            margin: 10px 0;
        }

        /* 訊息氣泡 */
        .message {
            max-width: 70%;
            padding: 16px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.5;
            margin-top: 12px;
            position: relative;
            word-break: break-all;
        }

        @media (max-width: 768px) {
            .message { max-width: 85%; padding: 12px; } /* 手機訊息變寬 */
        }

        .message.system-alert {
            background-color: #fff7ed;
            border: 1px solid #ffedd5;
            color: #7c2d12;
            align-self: flex-start;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(217, 119, 67, 0.05);
        }
        .message.system-alert .meta {
            font-size: 11px;
            color: #9a3412;
            margin-top: 8px;
        }

        .message.user {
            background-color: #fdfbf7;
            border: 1px solid var(--border-color);
            align-self: flex-end;
        }
        .message.ai {
            background-color: #f5ede4;
            color: var(--text-main);
            align-self: flex-start;
        }

        /* 下方輸入區 */
        .chat-footer {
            padding: 16px 20px;
            background: #fff;
            display: flex;
            flex-direction: column;
            gap: 12px;
            border-top: 1px solid var(--border-color);
        }

        @media (max-width: 768px) {
            .chat-footer { padding: 10px; }
        }

        .suggestion-row {
            display: flex;
            gap: 8px;
            overflow-x: auto; /* 手機板建議標籤可橫向捲動 */
            padding-bottom: 4px;
            -webkit-overflow-scrolling: touch;
        }
        .suggest-tag {
            background: #fff;
            border: 1px solid var(--border-color);
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            white-space: nowrap; /* 建議不換行 */
        }

        .input-box-wrapper {
            display: flex;
            align-items: center;
            background: #fff;
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 6px 6px 6px 16px;
        }
        .btn-plus {
            width: 32px;
            height: 32px;
            background: #fff7ed;
            border: none;
            border-radius: 50%;
            color: var(--accent-orange);
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 10px;
        }
        .input-box-wrapper textarea {
            flex: 1;
            border: none;
            outline: none;
            resize: none;
            height: 24px;
            font-size: 14px;
            color: var(--text-main);
            line-height: 24px;
            background: transparent;
        }
        .btn-submit {
            background-color: var(--accent-orange);
            color: white;
            border: none;
            padding: 8px 24px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s;
        }
        @media (max-width: 768px) {
            .btn-submit { padding: 8px 16px; } /* 手機按鈕變小點 */
        }
        .btn-submit:hover {
            background-color: var(--accent-orange-hover);
        }
        .bottom-counter {
            font-size: 12px;
            color: var(--text-muted);
            padding-left: 4px;
        }
        
        /* 側邊欄遮罩 */
        .sidebar-overlay {
            display: none;
            position: fixed;
            left: 0;
            top: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0,0,0,0.4);
            z-index: 99;
        }
        @media (max-width: 768px) {
            .sidebar-overlay.active { display: block; }
        }
    </style>
</head>
<body>

    <div class="sidebar-overlay" id="overlay"></div>

    <div class="sidebar" id="sidebar">
        
        <div class="sidebar-card header-card">
            <div class="orange-avatar">5</div>
            <div class="title-area">
                <h2>聊天對話窗</h2>
                <p>一個可互動的乾淨介面，適合展示訊息、側邊欄與輸入區。</p>
            </div>
        </div>

        <div class="sidebar-card">
            <div class="card-title">聊天概況</div>
            <div class="status-grid">
                <div class="status-item">
                    <div class="label">連線狀態</div>
                    <div class="value" id="connStatus" style="color: #2b6cb0;">未連線</div>
                </div>
                <div class="status-item">
                    <div class="label">訊息數</div>
                    <div class="value" id="msgCount">0</div>
                </div>
                <div class="status-item">
                    <div class="label">回應時間</div>
                    <div class="value">即時</div>
                </div>
                <div class="status-item">
                    <div class="label">模式</div>
                    <div class="value">ntfy</div>
                </div>
            </div>
        </div>

        <div class="sidebar-card">
            <div class="card-title">快速指令</div>
            <div class="tag-group">
                <div class="cmd-tag" onclick="useCmd('整理待辦')">整理待辦</div>
                <div class="cmd-tag" onclick="useCmd('改寫文字')">改寫文字</div>
                <div class="cmd-tag" onclick="useCmd('設計靈感')">設計靈感</div>
                <div class="cmd-tag" onclick="useCmd('簡短回覆')">簡短回覆</div>
            </div>
        </div>

        <div class="sidebar-card">
            <div class="card-title">ntfy.sh</div>
            <div class="input-group">
                <label>Topic</label>
                <input type="text" id="ntfyTopic" class="input-text" value="drher">
            </div>
            <div class="checkbox-group">
                <input type="checkbox" id="syncNtfy" checked>
                <label for="syncNtfy">送出訊息時同步推播到 ntfy.sh</label>
            </div>
            <div class="action-row">
                <button class="btn-sm" id="
