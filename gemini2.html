<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Sam 聊天視窗</title>
    <style>
        :root {
            --bg-color: #fcf8f2;       /* 圖片中的暖米色背景 */
            --panel-bg: #ffffff;
            --card-bg: #fffbf7;        /* 側邊欄卡片的微黃底色 */
            --accent-orange: #d97743;  /* 圖片中的暖橘色 */
            --accent-orange-hover: #bd5e2b;
            --text-main: #4a3e3d;      /* 帶有暖調的深色字體 */
            --text-muted: #8c7e7c;
            --border-color: #f3ece4;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            display: flex;
            height: 100vh;
            padding: 16px;
            gap: 16px;
            color: var(--text-main);
            overflow: hidden;
        }

        /* 左側設定面板 - 預設隱藏，手機板點擊選單才滑出 */
        .sidebar {
            width: 280px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            overflow-y: auto;
            padding-right: 4px;
            flex-shrink: 0;
            transition: transform 0.3s ease;
        }

        /* 側邊欄卡片通用樣式 */
        .sidebar-card {
            background-color: var(--card-bg);
            border-radius: 20px;
            padding: 16px;
            border: 1px solid var(--border-color);
        }

        /* 頂部標題卡片 */
        .header-card {
            display: flex;
            gap: 12px;
            align-items: flex-start;
        }
        .orange-avatar {
            background-color: var(--accent-orange);
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
            flex-shrink: 0;
        }
        .header-card .title-area h2 {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 4px;
        }
        .header-card .title-area p {
            font-size: 12px;
            color: var(--text-muted);
            line-height: 1.4;
        }

        /* 聊天概況卡片 */
        .card-title {
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 12px;
        }
        .status-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        .status-item {
            background: #fff;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 10px;
        }
        .status-item .label {
            font-size: 11px;
            color: var(--text-muted);
            margin-bottom: 4px;
        }
        .status-item .value {
            font-size: 14px;
            font-weight: 700;
        }

        /* 快速指令卡片 */
        .tag-group {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        .cmd-tag {
            background: #fff;
            border: 1px solid var(--border-color);
            padding: 6px 12px;
            border-radius: 14px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        .cmd-tag:hover {
            border-color: var(--accent-orange);
            color: var(--accent-orange);
        }

        /* ntfy 設定卡片 */
        .input-group {
            margin-bottom: 10px;
        }
        .input-group label {
            display: block;
            font-size: 12px;
            font-weight: 700;
            margin-bottom: 6px;
        }
        .input-text {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            font-size: 14px;
            outline: none;
            background: #fff;
        }
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            font-weight: 700;
            margin-bottom: 12px;
        }
        .checkbox-group input {
            width: 14px;
            height: 14px;
            accent-color: var(--accent-orange);
        }
        .action-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .btn-sm {
            padding: 6px 12px;
            border: 1px solid var(--border-color);
            background: #fff;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
        }
        .btn-sm:hover { background: #faf5ef; }
        .ntfy-status {
            font-size: 11px;
            color: var(--text-muted);
        }

        /* 聯絡人卡片 */
        .contact-box {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #fff;
            padding: 8px 12px;
            border-radius: 14px;
            border: 1px solid var(--border-color);
            position: relative;
        }
        .ux-avatar {
            background-color: #d97743;
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 700;
        }
        .contact-info h4 { font-size: 13px; font-weight: 700; }
        .contact-info p { font-size: 11px; color: var(--text-muted); }
        .dot {
            width: 8px;
            height: 8px;
            background-color: #eab308;
            border-radius: 50%;
            position: absolute;
            right: 12px;
        }

        /* 右側聊天主視窗 */
        .chat-container {
            flex: 1;
            background-color: var(--panel-bg);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            border: 1px solid var(--border-color);
            overflow: hidden;
            height: 100%;
        }

        /* 頂部導覽列 */
        .chat-header {
            padding: 12px 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        /* 漢堡選單按鈕 */
        .menu-toggle {
            display: none;
            background: none;
            border: none;
            font-size: 24px;
            color: var(--text-main);
            cursor: pointer;
            padding: 4px;
        }

        .cyan-avatar {
            background-color: #72b2b4;
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
        }
        .user-status h3 { font-size: 14px; font-weight: 700; }
        .user-status p { font-size: 11px; color: var(--text-muted); }
        
        .header-right {
            display: flex;
            gap: 6px;
        }
        .header-btn {
            background: #fdfbf7;
            border: 1px solid var(--border-color);
            padding: 6px 12px;
            border-radius: 14px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
        }

        /* 訊息區 */
        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            -webkit-overflow-scrolling: touch;
        }
        .date-divider {
            align-self: center;
            background: #f5ede4;
            padding: 2px 10px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 700;
            color: var(--text-muted);
            margin: 10px 0;
        }

        /* 訊息氣泡 */
        .message {
            max-width: 70%;
            padding: 16px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.5;
            margin-top: 12px;
            position: relative;
            word-break: break-all;
        }

        .message.system-alert {
            background-color: #fff7ed;
            border: 1px solid #ffedd5;
            color: #7c2d12;
            align-self: flex-start;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(217, 119, 67, 0.05);
        }
        .message.system-alert .meta {
            font-size: 11px;
            color: #9a3412;
            margin-top: 8px;
        }

        .message.user {
            background-color: #fdfbf7;
            border: 1px solid var(--border-color);
            align-self: flex-end;
        }
        .message.ai {
            background-color: #f5ede4;
            color: var(--text-main);
            align-self: flex-start;
        }

        /* 下方輸入區 */
        .chat-footer {
            padding: 16px 20px;
            background: #fff;
            display: flex;
            flex-direction: column;
            gap: 12px;
            border-top: 1px solid var(--border-color);
        }

        .suggestion-row {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 4px;
            -webkit-overflow-scrolling: touch;
        }
        .suggest-tag {
            background: #fff;
            border: 1px solid var(--border-color);
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            white-space: nowrap;
        }

        .input-box-wrapper {
            display: flex;
            align-items: center;
            background: #fff;
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 6px 6px 6px 16px;
        }
        .btn-plus {
            width: 32px;
            height: 32px;
            background: #fff7ed;
            border: none;
            border-radius: 50%;
            color: var(--accent-orange);
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 10px;
        }
        .input-box-wrapper textarea {
            flex: 1;
            border: none;
            outline: none;
            resize: none;
            height: 24px;
            font-size: 14px;
            color: var(--text-main);
            line-height: 24px;
            background: transparent;
        }
        .btn-submit {
            background-color: var(--accent-orange);
            color: white;
            border: none;
            padding: 8px 24px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-submit:hover {
            background-color: var(--accent-orange-hover);
        }
        .bottom-counter {
            font-size: 12px;
            color: var(--text-muted);
            padding-left: 4px;
        }
        
        /* 側邊欄黑色半透明遮罩 */
        .sidebar-overlay {
            display: none;
            position: fixed;
            left: 0;
            top: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0,0,0,0.4);
            z-index: 99;
        }

        /* 📱 核心手機響應式樣式修正 (強制寬度與防縮放) */
        @media screen and (max-width: 768px) {
            body {
                padding: 0 !important;
                gap: 0 !important;
            }
            
            /* 側邊欄變為全螢幕抽屜式 */
            .sidebar {
                position: fixed !important;
                left: 0 !important;
                top: 0 !important;
                height: 100vh !important;
                width: 290px !important;
                background-color: var(--bg-color) !important;
                z-index: 100 !important;
                transform: translateX(-100%);
                padding: 20px !important;
                box-shadow: 4px 0 15px rgba(0,0,0,0.1);
            }
            .sidebar.active {
                transform: translateX(0) !important;
            }
            .sidebar-overlay.active {
                display: block !important;
            }

            /* 聊天視窗強制滿版，不留任何邊距 */
            .chat-container {
                border-radius: 0 !important;
                border: none !important;
                width: 100vw !important;
                max-width: 100vw !important;
            }

            .menu-toggle {
                display: block !important; /* 顯示左上角漢堡選單 */
            }

            .chat-header {
                padding: 12px 14px !important;
            }

            .header-right {
                display: none !important; /* 手機版隱藏右側按鈕騰出空間 */
            }

            /* 讓對話氣泡更寬敞 */
            .chat-messages {
                padding: 12px !important;
            }
            .message {
                max-width: 92% !important; /* 氣泡寬度擴展到 92%，極致舒適 */
                padding: 12px 14px !important;
                margin-top: 10px !important;
            }

            .chat-footer {
                padding: 10px 12px !important;
            }
            .btn-submit {
                padding: 8px 16px !important;
            }
        }
    </style>
</head>
<body>

    <div class="sidebar-overlay" id="overlay"></div>

    <div class="sidebar" id="sidebar">
        
        <div class="sidebar-card header-card">
            <div class="orange-avatar">5</div>
            <div class="title-area">
                <h2>聊天對話窗</h2>
                <p>一個可互動的乾淨介面，適合展示訊息、側邊欄與輸入區。</p>
            </div>
        </div>

        <div class="sidebar-card">
            <div class="card-title">聊天概況</div>
            <div class="status-grid">
                <div class="status-item">
                    <div class="label">連線狀態</div>
                    <div class="value" id="connStatus" style="color: #2b6cb0;">未連線</div>
                </div>
                <div class="status-item">
                    <div class="label">訊息數</div>
                    <div class="value" id="msgCount">0</div>
                </div>
                <div class="status-item">
                    <div class="label">回應時間</div>
                    <div class="value">即時</div>
                </div>
                <div class="status-item">
                    <div class="label">模式</div>
                    <div class="value">ntfy</div>
                </div>
            </div>
        </div>

        <div class="sidebar-card">
            <div class="card-title">快速指令</div>
            <div class="tag-group">
                <div class="cmd-tag" onclick="useCmd('整理待辦')">整理待辦</div>
                <div class="cmd-tag" onclick="useCmd('改寫文字')">改寫文字</div>
                <div class="cmd-tag" onclick="useCmd('設計靈感')">設計靈感</div>
                <div class="cmd-tag" onclick="useCmd('簡短回覆')">簡短回覆</div>
            </div>
        </div>

        <div class="sidebar-card">
            <div class="card-title">ntfy.sh</div>
            <div class="input-group">
                <label>Topic</label>
                <input type="text" id="ntfyTopic" class="input-text" value="drher">
            </div>
            <div class="checkbox-group">
                <input type="checkbox" id="syncNtfy" checked>
                <label for="syncNtfy">送出訊息時同步推播到 ntfy.sh</label>
            </div>
            <div class="action-row">
                <button class="btn-sm" id="btnConnectNtfy">重新連線</button>
                <span class="ntfy-status" id="ntfyStatus">尚未連線</span>
            </div>
        </div>

        <div class="sidebar-card">
            <div class="card-title">聯絡人</div>
            <div class="contact-box">
                <div class="ux-avatar">UX</div>
                <div class="contact-info">
                    <h4>視覺夥伴</h4>
                    <p>提供配色、排版與互動提示。</p>
                </div>
                <div class="dot"></div>
            </div>
        </div>

    </div>

    <div class="chat-container">
        
        <div class="chat-header">
            <div class="header-left">
                <button class="menu-toggle" id="menuToggle">☰</button>
                <div class="cyan-avatar">S</div>
                <div class="user-status">
                    <h3>Sam 聊天視窗</h3>
                    <p>即時連線 · ntfy 雙向模式</p>
                </div>
            </div>
            <div class="header-right">
                <button class="header-btn">搜尋</button>
                <button class="header-btn">詳情</button>
                <button class="header-btn">更多</button>
            </div>
        </div>

        <div class="chat-messages" id="chatMessages">
            <div class="date-divider">今天</div>
            
            <div class="message system-alert" id="initCard">
                <p>尚無訊息，請在下方輸入內容發送，或等待該 ntfy 頻道接收外部新訊息。</p>
                <div class="meta">系統 · 現在</div>
            </div>
        </div>

        <div class="chat-footer">
            <div class="suggestion-row">
                <div class="suggest-tag" onclick="useCmd('更自然')">更自然</div>
                <div class="suggest-tag" onclick="useCmd('頁面優化')">頁面優化</div>
                <div class="suggest-tag" onclick="useCmd('標題建議')">標題建議</div>
            </div>

            <div class="input-box-wrapper">
                <button class="btn-plus">+</button>
                <textarea id="userInput" placeholder="輸入訊息，按 Enter 送出"></textarea>
                <button class="btn-submit" id="sendBtn">送出</button>
            </div>
            <div class="bottom-counter"><span id="charCount">0</span> 字元</div>
        </div>

    </div>

    <script>
        const chatMessages = document.getElementById('chatMessages');
        const userInput = document.getElementById('userInput');
        const charCount = document.getElementById('charCount');
        const sendBtn = document.getElementById('sendBtn');
        const msgCountElement = document.getElementById('msgCount');
        const connStatusElement = document.getElementById('connStatus');
        const ntfyTopicInput = document.getElementById('ntfyTopic');
        const ntfyStatus = document.getElementById('ntfyStatus');
        const btnConnectNtfy = document.getElementById('btnConnectNtfy');
        const syncNtfyCheckbox = document.getElementById('syncNtfy');
        
        // 手機板側邊欄控制
        const menuToggle = document.getElementById('menuToggle');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');

        function toggleSidebar() {
            sidebar.classList.toggle('active');
            overlay.classList.toggle('active');
        }

        menuToggle.addEventListener('click', toggleSidebar);
        overlay.addEventListener('click', toggleSidebar);

        let totalMessages = 0;
        let eventSource = null;

        // 即時計算字數
        userInput.addEventListener('input', () => {
            charCount.textContent = userInput.value.length;
        });

        // 快速標籤點擊填入
        function useCmd(text) {
            userInput.value = text;
            charCount.textContent = text.length;
            userInput.focus();
        }

        // 新增對話氣泡
        function appendMessage(text, sender) {
            const initCard = document.getElementById('initCard');
            if (initCard) initCard.remove();

            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message', sender);
            msgDiv.innerText = text;
            chatMessages.appendChild(msgDiv);
            
            chatMessages.scrollTop = chatMessages.scrollHeight;

            totalMessages++;
            msgCountElement.textContent = totalMessages;
        }

        // 送出訊息
        function handleSend() {
            const text = userInput.value.trim();
            if (!text) return;

            appendMessage(text, 'user');
            userInput.value = '';
            charCount.textContent = '0';

            if (syncNtfyCheckbox.checked) {
                sendToNtfy(text);
            }
        }

        // 串接 ntfy.sh 發送 (POST)
        function sendToNtfy(text) {
            const topic = ntfyTopicInput.value.trim();
            if (!topic) return;

            fetch(`https://ntfy.sh/${topic}`, {
                method: 'POST',
                body: text
            })
            .catch(err => console.error('ntfy 發送失敗:', err));
        }

        // 監聽 ntfy.sh 即時接收訊息 (SSE)
        function connectNtfy() {
            if (eventSource) {
                eventSource.close();
            }

            const topic = ntfyTopicInput.value.trim();
            if (!topic) {
                ntfyStatus.textContent = '請輸入 Topic';
                return;
            }

            ntfyStatus.textContent = `連線中...`;
            eventSource = new EventSource(`https://ntfy.sh/${topic}/sse`);

            eventSource.onmessage = (event) => {
                const data = JSON.parse(event.data);
                if (data.event === 'message' && data.message) {
                    appendMessage(data.message, 'ai');
                }
            };

            eventSource.onopen = () => {
                ntfyStatus.textContent = `已連線到 ${topic}`;
                ntfyStatus.style.color = '#d97743';
                connStatusElement.textContent = '已連線';
                connStatusElement.style.color = '#2b6cb0';
            };

            eventSource.onerror = () => {
                ntfyStatus.textContent = '連線中斷';
                ntfyStatus.style.color = 'red';
                connStatusElement.textContent = '中斷重連';
                connStatusElement.style.color = 'red';
            };
        }

        sendBtn.addEventListener('click', handleSend);
        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleSend();
            }
        });

        btnConnectNtfy.addEventListener('click', connectNtfy);
        connectNtfy();
    </script>
</body>
</html>
