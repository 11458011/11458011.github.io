<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Chat</title>
    <style>
        :root {
            --bg-color: #dbe4f3; /* 像素級還原的灰藍色背景 */
            --panel-bg: #ffffff;
            --primary-blue: #1c7fff; /* 圖片中的飽和藍色 */
            --primary-blue-shadow: rgba(28, 127, 255, 0.3);
            --danger-orange: #ff7f41; /* 圖片中的亮橘色 */
            --danger-orange-shadow: rgba(255, 127, 65, 0.3);
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border-color: #cbd5e1;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            display: flex;
            height: 100vh;
            padding: 16px;
            gap: 16px;
        }

        /* 左側設定面板 */
        .sidebar {
            width: 300px;
            background-color: var(--panel-bg);
            border-radius: 20px;
            padding: 24px 20px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .sidebar h2 {
            font-size: 26px;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 12px;
        }

        .sidebar .desc {
            font-size: 14px;
            color: #334155;
            line-height: 1.5;
            margin-bottom: 16px;
        }

        .section-title {
            font-size: 14px;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 8px;
        }

        .input-key {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            font-size: 15px;
            outline: none;
            margin-bottom: 6px;
            color: var(--text-main);
        }

        .input-key::placeholder {
            color: #94a3b8;
        }

        .hint-text {
            font-size: 12px;
            color: var(--text-muted);
            line-height: 1.4;
            margin-bottom: 16px;
        }

        .select-model {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            font-size: 15px;
            color: var(--text-main);
            outline: none;
            background-color: #fff;
            margin-bottom: 20px;
            cursor: pointer;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
        }

        .btn {
            flex: 1;
            padding: 11px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
        }

        .btn-blue {
            background-color: var(--primary-blue);
            box-shadow: 0 6px 16px var(--primary-blue-shadow);
        }
        .btn-orange {
            background-color: var(--danger-orange);
            box-shadow: 0 6px 16px var(--danger-orange-shadow);
        }

        .status-text {
            font-size: 13px;
            color: #334155;
            margin-bottom: 16px;
        }

        .tips-box {
            font-size: 13px;
            color: #334155;
            line-height: 1.5;
        }

        /* 右側聊天視窗 */
        .chat-container {
            flex: 1;
            background-color: var(--panel-bg);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            overflow: hidden;
        }

        .chat-header {
            padding: 16px 20px;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-header h3 {
            font-size: 18px;
            font-weight: 700;
            color: #0f172a;
        }

        .model-badge {
            background-color: #edf2f9;
            color: #475569;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 13px;
            font-family: monospace;
            border: 1px solid #cbd5e1;
        }

        .chat-messages {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        /* 完美還原的虛線歡迎對話框 */
        .welcome-msg {
            background-color: #edf4fe;
            color: #1e3a8a;
            padding: 12px 24px;
            border-radius: 16px;
            font-size: 14px;
            align-self: center;
            margin-top: 10px;
            border: 1px dashed #adcaf7;
            letter-spacing: 0.5px;
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 14px;
            font-size: 15px;
            line-height: 1.5;
            margin-top: 12px;
            word-break: break-all;
        }

        .message.user {
            background-color: #edf4fe;
            color: var(--text-main);
            align-self: flex-end;
        }

        .message.ai {
            background-color: #f1f5f9;
            color: var(--text-main);
            align-self: flex-start;
        }

        /* 下方輸入區 */
        .chat-input-area {
            padding: 16px 20px 20px 20px;
            border-top: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .textarea-container {
            width: 100%;
            position: relative;
        }

        .chat-input-area textarea {
            width: 100%;
            height: 76px;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 12px;
            font-size: 15px;
            color: var(--text-main);
            outline: none;
            resize: vertical; /* 還原右下角可拉桿 */
        }

        .chat-input-area textarea::placeholder {
            color: #94a3b8;
        }

        .input-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .word-count {
            font-size: 14px;
            color: #0f172a;
        }

        .btn-send {
            background-color: var(--primary-blue);
            color: white;
            border: none;
            padding: 10px 32px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 12px var(--primary-blue-shadow);
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>Gemini Chat</h2>
        <div class="desc">類似 ChatGPT 的對話介面。輸入 API Key 後即可直接呼叫 Gemini 回應。</div>
        
        <div class="section-title">Gemini API Key</div>
        <input type="password" id="apiKey" class="input-key" placeholder="貼上你的 API Key">
        <div class="hint-text">只保存在此頁面記憶體，不會寫入檔案或自動上傳。</div>

        <div class="section-title">模型</div>
        <select id="modelSelect" class="select-model">
            <option value="gemini-2.0-flash">gemini-2.0-flash</option>
            <option value="gemini-1.5-pro">gemini-1.5-pro</option>
            <option value="gemini-1.5-flash">gemini-1.5-flash</option>
        </select>

        <div class="btn-group">
            <button class="btn btn-blue" id="saveKeyBtn">暫存金鑰</button>
            <button class="btn btn-orange" id="clearChatBtn">清除對話</button>
        </div>

        <div class="status-text" id="statusText">尚未設定 API Key</div>

        <div class="tips-box">
            提示：若呼叫失敗，請檢查 API Key、模型名稱，或該金鑰是否啟用 Gemini API。
        </div>
    </div>

    <div class="chat-container">
        <div class="chat-header">
            <h3>聊天視窗</h3>
            <div class="model-badge" id="badgeModel">gemini-2.0-flash</div>
        </div>

        <div class="chat-messages" id="chatMessages">
            <div class="welcome-msg" id="welcomeMsg">
                歡迎使用 Gemini Chat。請先在左側輸入 API Key 並按「暫存金鑰」。
            </div>
        </div>

        <div class="chat-input-area">
            <div class="textarea-container">
                <textarea id="userInput" placeholder="輸入你的問題，按 Enter 送出（Shift+Enter 換行）"></textarea>
            </div>
            <div class="input-footer">
                <div class="word-count"><span id="charCount">0</span> 字元</div>
                <button class="btn-send" id="sendBtn">送出訊息</button>
            </div>
        </div>
    </div>

    <script>
        const apiKeyInput = document.getElementById('apiKey');
        const modelSelect = document.getElementById('modelSelect');
        const saveKeyBtn = document.getElementById('saveKeyBtn');
        const clearChatBtn = document.getElementById('clearChatBtn');
        const statusText = document.getElementById('statusText');
        const badgeModel = document.getElementById('badgeModel');
        const chatMessages = document.getElementById('chatMessages');
        const userInput = document.getElementById('userInput');
        const charCount = document.getElementById('charCount');
        const sendBtn = document.getElementById('sendBtn');
        const welcomeMsg = document.getElementById('welcomeMsg');

        let apiKey = '';

        modelSelect.addEventListener('change', () => {
            badgeModel.textContent = modelSelect.value;
        });

        userInput.addEventListener('input', () => {
            charCount.textContent = userInput.value.length;
        });

        saveKeyBtn.addEventListener('click', () => {
            apiKey = apiKeyInput.value.trim();
            if (apiKey) {
                statusText.textContent = '金鑰已暫存';
                statusText.style.color = '#1c7fff';
            } else {
                statusText.textContent = '尚未設定 API Key';
                statusText.style.color = '#334155';
            }
        });

        clearChatBtn.addEventListener('click', () => {
            chatMessages.innerHTML = '';
            chatMessages.appendChild(welcomeMsg);
        });

        function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            if (document.getElementById('welcomeMsg')) {
                welcomeMsg.remove();
            }

            appendMessage(text, 'user');
            userInput.value = '';
            charCount.textContent = '0';

            if (!apiKey) {
                setTimeout(() => {
                    appendMessage('【系統提示】你尚未設定 API 金鑰。這是一個模擬回應。請在左側輸入有效 Key 後再試。', 'ai');
                }, 600);
                return;
            }

            appendMessage('思考中...', 'ai', true);
            const selectedModel = modelSelect.value;
            const url = `https://generativelanguage.googleapis.com/v1beta/models/${selectedModel}:generateContent?key=${apiKey}`;

            fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: text }] }] })
            })
            .then(res => res.json())
            .then(data => {
                removeLoading();
                if (data.candidates && data.candidates[0].content.parts[0].text) {
                    appendMessage(data.candidates[0].content.parts[0].text, 'ai');
                } else {
                    appendMessage('回傳資料格式有誤。', 'ai');
                }
            })
            .catch(() => {
                removeLoading();
                appendMessage('連線失敗，請檢查網路或金鑰。', 'ai');
            });
        }

        function appendMessage(text, sender, isLoading = false) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message', sender);
            if (isLoading) msgDiv.classList.add('loading-msg');
            msgDiv.innerText = text;
            chatMessages.appendChild(msgDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function removeLoading() {
            const loading = document.querySelector('.loading-msg');
            if (loading) loading.remove();
        }

        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
    </script>
</body>
</html>
