<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>和 AI 對話的工作台</title>
    <style>
        :root {
            --bg-page: #f0f4f9;
            --bg-sidebar: #f8fafc;
            --bg-chat: #ffffff;
            --primary-color: #3b82f6;
            --primary-hover: #2563eb;
            --text-main: #1e293b;
            --text-sub: #64748b;
            --border-color: #e2e8f0;
            --bg-user-msg: #e0f2fe;
            --text-user-msg: #0369a1;
            --bg-ai-msg: #f1f5f9;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            display: flex;
            height: 100vh;
            background-color: var(--bg-page);
            color: var(--text-main);
            overflow: hidden;
        }

        /* 📌 左側側邊欄 */
        .sidebar {
            width: 300px;
            background-color: var(--bg-sidebar);
            border-right: 1px solid var(--border-color);
            padding: 24px 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
            flex-shrink: 0;
        }

        .logo-badge {
            display: inline-block;
            background-color: #e0f2fe;
            color: #0284c7;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            width: fit-content;
            margin-bottom: 8px;
        }

        .logo-area h1 {
            font-size: 1.75rem;
            font-weight: 700;
            line-height: 1.2;
            color: #0f172a;
        }

        .logo-area p {
            font-size: 0.85rem;
            color: var(--text-sub);
            margin-top: 8px;
            line-height: 1.4;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-group label {
            font-size: 0.8rem;
            font-weight: 700;
            color: #475569;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="password"], select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 0.9rem;
            outline: none;
            background-color: #ffffff;
            color: var(--text-main);
        }

        input[type="password"]:focus, select:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.1);
        }

        .sidebar-hint {
            font-size: 0.75rem;
            color: var(--text-sub);
            line-height: 1.4;
        }

        .btn-group {
            display: flex;
            gap: 10px;
        }

        button {
            padding: 10px 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            transition: background 0.2s, transform 0.1s;
        }

        .btn-primary { background-color: var(--primary-color); color: white; }
        .btn-primary:hover { background-color: var(--primary-hover); }
        .btn-secondary { background-color: #ffffff; border: 1px solid var(--border-color); color: #334155; }
        .btn-secondary:hover { background-color: #f8fafc; }

        .quick-tags {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        
        .tag-btn {
            background: #ffffff;
            border: 1px solid var(--border-color);
            padding: 8px;
            font-size: 0.8rem;
            font-weight: 500;
            border-radius: 6px;
            color: #334155;
        }
        .tag-btn:hover { background-color: #f1f5f9; border-color: #cbd5e1; }

        /* 📌 右側主聊天區 */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: var(--bg-chat);
            height: 100vh;
        }

        .chat-header {
            padding: 18px 24px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #ffffff;
        }

        .chat-header h2 { font-size: 1.1rem; font-weight: 700; }
        .chat-header .model-badge { font-size: 0.8rem; color: var(--text-sub); font-weight: 500; }

        .chat-messages {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
            background-color: #f8fafc;
        }

        .message-row {
            display: flex;
            flex-direction: column;
            width: 100%;
        }

        .message-sender {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-sub);
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .message-row.user .message-sender { align-self: flex-end; flex-direction: row-reverse; color: #0284c7; }
        .message-row.ai .message-sender { align-self: flex-start; color: #475569; }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 0.95rem;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-all;
            box-shadow: 0 1px 2px rgba(0,0,0,0.02);
        }

        .message-row.ai .message {
            background-color: var(--bg-ai-msg);
            color: var(--text-main);
            align-self: flex-start;
            border-top-left-radius: 2px;
        }

        .message-row.user .message {
            background-color: var(--bg-user-msg);
            color: var(--text-user-msg);
            align-self: flex-end;
            border-top-right-radius: 2px;
        }

        .message.error {
            background-color: #fef2f2;
            color: #991b1b;
            border: 1px solid #fee2e2;
            font-family: monospace;
            font-size: 0.85rem;
            max-width: 90%;
        }

        /* 📌 底部輸入區塊 */
        .input-area {
            padding: 20px 24px;
            border-top: 1px solid var(--border-color);
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .textarea-wrapper {
            width: 100%;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 10px 14px;
            background-color: #ffffff;
        }
        .textarea-wrapper:focus-within {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.1);
        }

        textarea {
            width: 100%;
            height: 60px;
            border: none;
            resize: none;
            outline: none;
            font-size: 0.95rem;
            line-height: 1.5;
            color: var(--text-main);
            background: transparent;
        }

        .input-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
            color: var(--text-sub);
        }

        .action-btns {
            display: flex;
            gap: 8px;
        }

        .action-btns button { padding: 8px 16px; font-size: 0.85rem; border-radius: 20px; }
        button:disabled { background-color: #cbd5e1; color: #94a3b8; cursor: not-allowed; }

        /* 📱 手機板 RWD 響應式優化 */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; height: auto; max-height: 40vh; border-right: none; border-bottom: 1px solid var(--border-color); padding: 16px; }
            .main-content { height: 60vh; }
            .chat-messages { padding: 16px; }
            .message { max-width: 90%; }
            .input-area { padding: 12px 16px; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo-area">
            <div class="logo-badge">Gemini Chat</div>
            <h1>和 AI 對話的工作台</h1>
            <p>輸入 Gemini API Key 後即可發送請求。介面會把你的對話保存在本地，方便重新整理後繼續使用。</p>
        </div>

        <div class="form-group">
            <label>GEMINI API KEY</label>
            <input type="password" id="apiKey" placeholder="請輸入您的 API Key...">
            <div class="sidebar-hint">只儲存在這個瀏覽器，不會自動上傳到任何地方。</div>
        </div>

        <div class="form-group">
            <label>模型</label>
            <select id="modelSelect" onchange="updateHeaderModel()">
                <option value="gemini-2.0-flash">gemini-2.0-flash</option>
                <option value="gemini-1.5-flash">gemini-1.5-flash</option>
                <option value="gemini-1.5-pro-latest">gemini-1.5-pro-latest</option>
            </select>
        </div>

        <div class="btn-group">
            <button class="btn-primary" onclick="saveSettings()">暫存金鑰</button>
            <button class="btn-secondary" onclick="clearChat()">清除對話</button>
        </div>

        <hr style="border: 0; border-top: 1px solid var(--border-color); margin: 5px 0;">

        <div class="form-group">
            <label>快速提問</label>
            <div class="quick-tags">
                <button class="tag-btn" onclick="insertTag('改寫文字')">改寫文字</button>
                <button class="tag-btn" onclick="insertTag('整理重點')">整理重點</button>
                <button class="tag-btn" onclick="insertTag('前端建議')">前端建議</button>
                <button class="tag-btn" onclick="insertTag('摘要草稿')">摘要草稿</button>
            </div>
        </div>

        <div class="form-group" style="margin-top: auto;">
            <label>說明</label>
            <div class="sidebar-hint">
                按 Enter 發送。Shift+Enter 換行。<br>
                若沒有 API Key，曾登入過顯示網頁，方便您進行版面效果與美工。
            </div>
        </div>
    </div>

    <div class="main-content">
        <div class="chat-header">
            <h2>聊天視窗</h2>
            <div class="model-badge" id="headerModel">由 Gemini API 驅動</div>
        </div>

        <div class="chat-messages" id="chatMessages">
            <div class="message-row ai">
                <div class="message-sender">🤖 Gemini</div>
                <div class="message">我是 Gemini Chat，現在可以為您解答問題。您可以輸入任何問題與我對話。</div>
            </div>
        </div>

        <div class="input-area">
            <div class="textarea-wrapper">
                <textarea id="userInput" placeholder="輸入您的問題，按 Enter 發送 (Shift+Enter 換行)"></textarea>
            </div>
            <div class="input-footer">
                <span id="charCount">0 字元</span>
                <div class="action-btns">
                    <button class="btn-secondary" style="padding: 6px 14px;" onclick="clearInputFields()">點入字群清理</button>
                    <button class="btn-primary" id="sendBtn" style="padding: 6px 20px;" onclick="sendMessage()">發送訊息</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 頁面載入時初始化設定
        document.addEventListener('DOMContentLoaded', () => {
            if(localStorage.getItem('gemini_api_key')) {
                document.getElementById('apiKey').value = localStorage.getItem('gemini_api_key');
            }
            if(localStorage.getItem('gemini_model')) {
                document.getElementById('modelSelect').value = localStorage.getItem('gemini_model');
            }
            updateHeaderModel();
            
            // 字數計算監聽
            const textarea = document.getElementById('userInput');
            textarea.addEventListener('input', () => {
                document.getElementById('charCount').innerText = `${textarea.value.length} 字元`;
            });

            // 監聽 Enter 發送
            textarea.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });
        });

        function updateHeaderModel() {
            const model = document.getElementById('modelSelect').value;
            document.getElementById('headerModel').innerText = model;
        }

        function saveSettings() {
            const key = document.getElementById('apiKey').value.trim();
            const model = document.getElementById('modelSelect').value;
            localStorage.setItem('gemini_api_key', key);
            localStorage.setItem('gemini_model', model);
            alert('設定金鑰成功！');
        }

        function insertTag(text) {
            const textarea = document.getElementById('userInput');
            textarea.value = text;
            document.getElementById('charCount').innerText = `${text.length} 字元`;
            textarea.focus();
        }

        function clearInputFields() {
            document.getElementById('userInput').value = '';
            document.getElementById('charCount').innerText = '0 字元';
        }

        function clearChat() {
            if(confirm('確定要清空聊天視窗嗎？')) {
                document.getElementById('chatMessages').innerHTML = `
                    <div class="message-row ai">
                        <div class="message-sender">🤖 Gemini</div>
                        <div class="message">對話已清空。您可以開始新的對話。</div>
                    </div>`;
            }
        }

        function appendMessage(text, role, isError = false) {
            const container = document.getElementById('chatMessages');
            const rowDiv = document.createElement('div');
            rowDiv.classList.add('message-row', role);
            
            const senderDiv = document.createElement('div');
            senderDiv.classList.add('message-sender');
            senderDiv.innerText = role === 'user' ? '👤 使用者' : '🤖 Gemini';
            
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message');
            if (isError) msgDiv.classList.add('error');
            msgDiv.innerText = text;
            
            rowDiv.appendChild(senderDiv);
            rowDiv.appendChild(msgDiv);
            container.appendChild(rowDiv);
            container.scrollTop = container.scrollHeight; // 自動捲動到底部
        }

        // 核心發送機制與 API 介接
        async function sendMessage() {
            const apiKey = document.getElementById('apiKey').value.trim();
            const model = document.getElementById('modelSelect').value;
            const inputField = document.getElementById('userInput');
            const prompt = inputField.value.trim();
            const sendBtn = document.getElementById('sendBtn');

            if (!prompt) return;

            // 1. 顯示使用者發送的文字
            appendMessage(prompt, 'user');
            clearInputFields();

            if (!apiKey) {
                // 如果沒有填 key，則切換至示範體驗模式，將回傳格式化錯誤
                setTimeout(() => {
                    appendMessage("目前無法連線到 Gemini，已切回示範模式。\\n\\nGemini API 回應失敗 : 403\\n{\\n  \\"error\\": {\\n    \\"message\\": \\"API key not valid. Please pass a valid API key.\\"\\n  \n}", 'ai', false);
                }, 800);
                return;
            }

            // 2. 禁用發送按鈕防止重複連點
            sendBtn.disabled = true;
            sendBtn.innerText = '處理中...';

            try {
                // 3. 發送請求至 Google Gemini API
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }]
                    })
                });

                const data = await response.json();

                // 4. 解析回應
                if (response.ok) {
                    if (data.candidates && data.candidates[0]?.content?.parts?.[0]?.text) {
                        const reply = data.candidates[0].content.parts[0].text;
                        appendMessage(reply, 'ai');
                    } else {
                        appendMessage("收到未預期的回應結構。", 'ai');
                    }
                } else {
                    // 還原截圖中的 JSON 錯誤呈現方式
                    let formattedError = `Gemini API 回應失敗 : ${response.status} {\n`;
                    formattedError += JSON.stringify(data, null, 2);
                    formattedError += `\n}`;
                    appendMessage(formattedError, 'ai', true);
                }

            } catch (error) {
                appendMessage(`網路連線錯誤：${error.message}`, 'ai', true);
            } finally {
                // 5. 恢復按鈕狀態
                sendBtn.disabled = false;
                sendBtn.innerText = '發送訊息';
            }
        }
    </script>
</body>
</html>
